services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: scraper_web
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      SCRAPER_ENGINE_URL: http://scraper-engine:8000
    depends_on:
      - mongodb
      - scraper-engine

  scraper-engine:
    build:
      context: .
      dockerfile: web-scraper-engine/Dockerfile
    container_name: scraper_engine
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: scraper_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: